# .github/workflows/ci.yml
#
# 每次 push 和 PR 时运行测试，确保发布前代码质量

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---- Rust 测试 & Lint ----
  rust-check:
    name: Rust check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/nano_ray_core

      - name: Format check
        run: cargo fmt --manifest-path rust/nano_ray_core/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path rust/nano_ray_core/Cargo.toml -- -D warnings

      - name: Test
        run: cargo test --manifest-path rust/nano_ray_core/Cargo.toml

  # ---- Python 测试 ----
  python-test:
    name: Python test - ${{ matrix.os }} - py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check python/

      - name: Test
        run: pytest tests/python/ -v