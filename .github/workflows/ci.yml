# .github/workflows/ci.yml
#
# Runs on every push and PR to main.
# Checks: Rust fmt/clippy/test, Python ruff/pytest across platforms.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---- Rust format, lint, test ----
  rust-check:
    name: Rust check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          # Workspace root is repo root; crate lives under rust/nano_ray_core
          workspaces: ". -> target"

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      # --lib: only run unit tests (skip cdylib link which needs Python runtime)
      - name: Test
        run: cargo test --lib

  # ---- Python lint (runs once, not per-platform) ----
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check python/

      - name: Ruff format check
        run: ruff format --check python/

  # ---- Python tests (multi-platform, multi-version) ----
  python-test:
    name: Python test - ${{ matrix.os }} - py${{ matrix.python-version }}
    needs: [rust-check, python-lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest tests/python/ -v
