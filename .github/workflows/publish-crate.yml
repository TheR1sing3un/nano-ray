# .github/workflows/publish-crate.yml
#
# 当推送 tag (格式: v*) 时，自动发布 Rust crate 到 crates.io
# 需要在 GitHub repo Settings > Secrets 中配置:
#   - CARGO_REGISTRY_TOKEN: crates.io API token

name: Publish Rust Crate to crates.io

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/nano_ray_core

      # 先做一次 dry-run 验证
      - name: Verify crate can be packaged
        run: cargo publish --dry-run --manifest-path rust/nano_ray_core/Cargo.toml

      # 实际发布 (仅 tag push 时)
      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/v')
        run: cargo publish --manifest-path rust/nano_ray_core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}