# .github/workflows/publish-crate.yml
#
# Publishes the Rust crate to crates.io when a tag (v*) is pushed.
#
# Note: nano-ray-core is a PyO3 extension module (cdylib + rlib). The cdylib
# output cannot be verified without the Python runtime, so we use --no-verify
# for packaging. The rlib output is usable from other Rust crates.
#
# Required secret: CARGO_REGISTRY_TOKEN (crates.io API token)

name: Publish Rust Crate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Verify the crate can be packaged (--no-verify skips the build step
      # which would fail because the cdylib links against Python at runtime)
      - name: Verify crate can be packaged
        run: cargo package --no-verify --manifest-path rust/nano_ray_core/Cargo.toml

      # Run unit tests (--lib skips cdylib link which needs Python runtime)
      - name: Run tests
        run: cargo test --lib --manifest-path rust/nano_ray_core/Cargo.toml

      # Publish (only on tag push, not manual workflow_dispatch)
      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/v')
        run: cargo publish --no-verify --manifest-path rust/nano_ray_core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
